<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INTERCONN Telecomunicaciones</title>

<link href="assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
<link href="assets/vendor/boxicons/css/boxicons.min.css" rel="stylesheet">

<style>

/* ===== LAYOUT ===== */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f4f6f9;
}

/* ===== MENU LATERAL ===== */
#header {
    position: fixed;
    top: 0;
    left: 0;
    width: 260px;
    height: 100%;
    background: #0b3d91;
    padding: 20px;
    color: white;
    z-index: 999;
}

/* ===== CONTENIDO ===== */
#main {
    margin-left: 260px;
    padding: 20px;
}

/* ===== PORTADA ===== */
#portada {
    background: linear-gradient(135deg, #0b3d91, #1e88e5);
    padding: 80px;
    border-radius: 12px;
    color: white;
    text-align: center;
}

/* ===== SECCIONES ===== */
section {
    background: white;
    margin-top: 20px;
    padding: 30px;
    border-radius: 10px;
}

/* ===== MENU LINKS ===== */
.nav-menu a {
    display: block;
    color: white;
    padding: 10px;
    text-decoration: none;
}

.nav-menu a:hover {
    background: rgba(255,255,255,0.2);
}

/* ===== REDES ===== */
.social-links a {
    display: inline-flex;
    width: 40px;
    height: 40px;
    background: #1e2a38;
    color: #fff;
    border-radius: 50%;
    align-items: center;
    justify-content: center;
    margin: 5px;
}

.facebook:hover { background: #1877f2; }
.instagram:hover { background: #e1306c; }
.whatsapp:hover { background: #25d366; }

/* ===== WHATSAPP ===== */
.whatsapp-float {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25d366;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* ===== ANIMACIONES ===== */
.hidden {
    opacity: 0;
    transform: translateY(40px);
    transition: 0.8s;
}
.show {
    opacity: 1;
    transform: translateY(0);
}

</style>

</head>

<body>

<!-- MENU -->
<header id="header">

    <div class="text-center">
        <img src="assets/img/1.jpeg" class="img-fluid rounded-circle">
    </div>

    <div class="social-links text-center">
        <a href="#" class="facebook"><i class="bx bxl-facebook"></i></a>
        <a href="#" class="instagram"><i class="bx bxl-instagram"></i></a>
        <a href="https://wa.me/527751376971" class="whatsapp"><i class="bx bxl-whatsapp"></i></a>
    </div>

    <nav class="nav-menu">
        <a href="#portada" class="scrollto">Inicio</a>
        <a href="#about" class="scrollto">¿Quiénes somos?</a>
        <a href="#resume" class="scrollto">Misión y Visión</a>
        <a href="#proyectos" class="scrollto">Información</a>
        <a href="#contact" class="scrollto">Contacto</a>
    </nav>

</header>

<!-- CONTENIDO -->
<main id="main">

<section id="portada">
    <h1>INTERCONN TELECOMUNICACIONES</h1>
    <p>Internet rápido y confiable</p>
</section>

<section id="about">
    <h2>¿Quiénes somos?</h2>
    <p>Empresa mexicana fundada en 2018.</p>
</section>

<section id="resume">
    <h2>Misión</h2>
    <p>Brindar servicios de calidad.</p>
</section>

<section id="proyectos">
    <h2>Información</h2>
    <ul>
        <li><a href="#">Título de concesión</a></li>
        <li><a href="#">Constancia IFT</a></li>
    </ul>
</section>

<section id="contact">
    <h2>Contacto</h2>
    <p>WhatsApp: 7751376971</p>
</section>

</main>

<!-- WHATSAPP -->
<a href="https://wa.me/527751376971" class="whatsapp-float">
    <i class="bx bxl-whatsapp"></i>
</a>

<!-- SCRIPT -->
<script>
document.querySelectorAll('.scrollto').forEach(link => {
    link.addEventListener('click', function(e) {
        e.preventDefault();
        document.querySelector(this.getAttribute("href")).scrollIntoView({
            behavior: "smooth"
        });
    });
});

// Animaciones
const sections = document.querySelectorAll("section");

const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
        if (entry.isIntersecting) {
            entry.target.classList.add("show");
        }
    });
});

sections.forEach(sec => {
    sec.classList.add("hidden");
    observer.observe(sec);
});
</script>

</body>
</html>
